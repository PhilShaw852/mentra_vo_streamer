<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch stream – Mentra Live</title>
  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #0f0f12;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .video-wrap {
      width: 100%;
      max-width: 720px;
      background: #000;
      border-radius: 0.5rem;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-wrap video { width: 100%; height: 100%; display: block; }
    .status {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #a1a1aa;
    }
    .status.error { color: #fca5a5; }
    a { color: #818cf8; }
  </style>
</head>
<body>
  <h1>Live stream</h1>
  <div class="video-wrap">
    <video id="video" controls muted playsinline></video>
  </div>
  <p class="status" id="status">Loading…</p>
  <p><a href="/">Back to stream setup</a></p>

  <script>
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');

    async function play() {
      const res = await fetch('/api/receiver-info');
      const info = await res.json();
      const url = info.playbackUrl;
      if (!url) {
        statusEl.textContent = 'No playback URL.';
        statusEl.classList.add('error');
        return;
      }
      if (!flvjs.isSupported()) {
        statusEl.textContent = 'FLV playback not supported in this browser.';
        statusEl.classList.add('error');
        return;
      }
      const flvPlayer = flvjs.createPlayer({
        type: 'flv',
        url: url,
        isLive: true,
        hasAudio: true,
        hasVideo: true,
      }, { enableStashBuffer: false, stashInitialSize: 128 });
      flvPlayer.attachMediaElement(video);
      flvPlayer.load();
      flvPlayer.play();
      flvPlayer.on(flvjs.Events.ERROR, () => {
        statusEl.textContent = 'Stream not available. Start the stream from the glasses first.';
        statusEl.classList.add('error');
      });
      flvPlayer.on(flvjs.Events.LOADING_COMPLETE, () => {
        statusEl.textContent = 'Live';
        statusEl.classList.remove('error');
      });
      statusEl.textContent = 'Connecting…';
    }
    play();
  </script>
</body>
</html>
