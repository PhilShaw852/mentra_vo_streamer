<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentra Live – Stream URL</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 28rem;
      margin: 0 auto;
      padding: 1.5rem;
      background: #0f0f12;
      color: #e4e4e7;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    p {
      color: #a1a1aa;
      font-size: 0.875rem;
      margin: 0 0 1.25rem;
    }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 0.375rem;
      color: #d4d4d8;
    }
    input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 0.9375rem;
      border: 1px solid #3f3f46;
      border-radius: 0.5rem;
      background: #18181b;
      color: #e4e4e7;
      margin-bottom: 1rem;
    }
    input::placeholder { color: #71717a; }
    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
    }
    .buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-start {
      background: #6366f1;
      color: white;
    }
    .btn-start:hover:not(:disabled) { background: #4f46e5; }
    .btn-stop {
      background: #3f3f46;
      color: #e4e4e7;
    }
    .btn-stop:hover:not(:disabled) { background: #52525b; }
    .message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      display: none;
    }
    .message.visible { display: block; }
    .message.success { background: #14532d; color: #86efac; }
    .message.error { background: #450a0a; color: #fca5a5; }
  </style>
</head>
<body>
  <h1>Stream receiver URL</h1>
  <p>Use the <strong>local receiver</strong> (this device) or enter any RTMP URL. Then start the app on your glasses and click Start stream.</p>

  <form id="form" novalidate>
    <label for="url">RTMP URL</label>
    <input
      type="url"
      id="url"
      name="rtmpUrl"
      placeholder="rtmp://localhost:19350/live/mentra"
      autocomplete="off"
      required
    />
    <div class="buttons">
      <button type="submit" class="btn-start" id="btnStart">Start stream</button>
      <button type="button" class="btn-stop" id="btnStop">Stop stream</button>
    </div>
  </form>
  <p style="margin-top: 1rem;">
    <a href="/watch.html" style="color: #818cf8;">Watch stream</a> · <a href="/detect.html" style="color: #818cf8;">Watch + detect (laptop, phone)</a> (after starting)
  </p>

  <div id="message" class="message" role="status"></div>

  <script>
    const form = document.getElementById('form');
    const urlInput = document.getElementById('url');
    // Pre-fill with local edge receiver URL
    fetch('/api/receiver-info').then(r => r.json()).then(info => {
      urlInput.placeholder = info.rtmpUrl;
      if (!urlInput.value) urlInput.value = info.rtmpUrl;
    }).catch(() => {});
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const messageEl = document.getElementById('message');

    function showMessage(text, isError) {
      messageEl.textContent = text;
      messageEl.className = 'message visible ' + (isError ? 'error' : 'success');
    }

    function hideMessage() {
      messageEl.className = 'message';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();
      const rtmpUrl = urlInput.value.trim();
      if (!rtmpUrl) return;
      if (!rtmpUrl.startsWith('rtmp://') && !rtmpUrl.startsWith('rtmps://')) {
        showMessage('URL must start with rtmp:// or rtmps://', true);
        return;
      }
      btnStart.disabled = true;
      try {
        const res = await fetch('/api/start-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rtmpUrl }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          showMessage('Stream started.');
        } else {
          showMessage(data.error || 'Failed to start stream', true);
        }
      } catch (err) {
        showMessage('Network error. Is the app running?', true);
      } finally {
        btnStart.disabled = false;
      }
    });

    btnStop.addEventListener('click', async () => {
      hideMessage();
      btnStop.disabled = true;
      try {
        const res = await fetch('/api/stop-stream', { method: 'POST' });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          showMessage('Stream stopped.');
        } else {
          showMessage(data.error || 'Failed to stop stream', true);
        }
      } catch (err) {
        showMessage('Network error.', true);
      } finally {
        btnStop.disabled = false;
      }
    });
  </script>
</body>
</html>
